<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window>" in certain iframe environments
      (function() {
        if (typeof window !== 'undefined') {
          try {
            var nativeFetch = window.fetch;
            if (nativeFetch) {
              // Define fetch with a dummy setter to prevent crashes when libraries try to polyfill it
              Object.defineProperty(window, 'fetch', {
                get: function() { return nativeFetch; },
                set: function() { /* Prevent crash on assignment */ },
                configurable: true,
                enumerable: true
              });
            }
          } catch (e) {
            // Ignore errors
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
